name: Continuous Deployment - Vercel
# Revision: v1.1 - Force trigger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Monorepo)
        run: |
          npm install
          cd server && npm install
          cd ../client && npm install
          npm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ github.ref_name == 'master' && 'production' || 'preview' }} --token=${{ secrets.token_vercel }}
        env:
          VERCEL_ORG_ID: ${{ secrets.teamID }}
          VERCEL_PROJECT_ID: ${{ secrets.proejctID }}

      - name: Build Project Artifacts
        run: vercel build ${{ github.ref_name == 'master' && '--prod' || '' }} --token=${{ secrets.token_vercel }}
        env:
          VERCEL_ORG_ID: ${{ secrets.teamID }}
          VERCEL_PROJECT_ID: ${{ secrets.proejctID }}

      - name: Flatten Build Output (Bypass 404)
        run: |
          if [ -d ".vercel/output/static/browser" ]; then
            cp -r .vercel/output/static/browser/* .vercel/output/static/
            echo "Archivos movidos de /browser a la raíz con éxito."
          else
            echo "No se encontró carpeta /browser, continuando sin cambios."
          fi

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt ${{ github.ref_name == 'master' && '--prod' || '' }} --token=${{ secrets.token_vercel }}
        env:
          VERCEL_ORG_ID: ${{ secrets.teamID }}
          VERCEL_PROJECT_ID: ${{ secrets.proejctID }}
