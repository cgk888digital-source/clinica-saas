<div *ngIf="incomingCall()" class="call-notification-overlay">
  <div class="call-card glass">
    <div class="call-header">
      <div class="pulse-icon">
        <i class="bi bi-camera-video-fill"></i>
        <div class="pulse-circle"></div>
      </div>
      <div class="call-info">
        <h3>{{ callMessage() }}</h3>
        <p>{{ langService.isSpanish() ? 'Videoconsulta Pendiente' : 'Pending Video Consultation' }}</p>
      </div>
    </div>
    
    <div class="call-actions">
      <button class="btn-decline" (click)="declineCall()">
        <i class="bi bi-telephone-x-fill"></i>
      </button>
      <button class="btn-accept" (click)="acceptCall()">
        <i class="bi bi-telephone-fill"></i>
        <span>{{ langService.isSpanish() ? 'Aceptar' : 'Accept' }}</span>
      </button>
    </div>
  </div>
</div>
